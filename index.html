<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <link rel="icon" href="images/icono.png" type="image/png">
    <title>Buenos Aires by Night</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/ui-components.css">
    <link rel="stylesheet" href="css/games.css">
    <link rel="stylesheet" href="css/game.css">
    <link rel="stylesheet" href="css/chronicles.css">
    <link rel="stylesheet" href="css/character-sheets.css">
    <link rel="stylesheet" href="css/modal-close.css">
</head>

<body>
    <div class="app">
        <aside class="sidebar">
            <div class="logo-container">
                <img class="icono" src="images/icono.png" alt="Buenos Aires by Night">
                <img class="icono-grande" src="images/icono-grande.png" alt="Buenos Aires by Night">
            </div>
            <nav class="nav">
                <ul>
                    <li id="menu-welcome"><a href="#welcome"><i data-lucide="log-in"></i><span>Bienvenido</span></a></li>
                    <li id="menu-user" class="hidden"><a href="#user"><i data-lucide="user-circle"></i><span
                                id="user-name"></span></a></li>
                    <li id="menu-chronicles" class="hidden"><a href="#chronicles"><i
                                data-lucide="book-open"></i><span>Crónicas</span></a></li>
                    <li id="menu-chars" class="hidden"><a href="#character-sheets"><i
                                data-lucide="scroll"></i><span>Personajes</span></a></li>
                    <li id="menu-games" class="hidden"><a href="#games"><i data-lucide="swords"></i><span>Almagro
                                de Noche</span></a>
                    </li>
                    <li id="menu-tools" class="hidden"><a href="#tools"><i
                                data-lucide="wrench"></i><span>Herramientas</span></a>
                    </li>
                    <li id="menu-settings" class="hidden"><a href="#settings"><i
                                data-lucide="settings"></i><span>Configuración</span></a>
                    </li>
                    <li class="grabado">`</li>
                    <li id="menu-quick-actions" class="nav-quick-actions hidden">
                        <a href="#" id="sidebar-toggle" class="icon-btn" title="Colapsar/Expandir barra lateral"
                            aria-label="Colapsar o expandir barra lateral"><i data-lucide="panel-left-close"></i></a>
                        <a href="#" id="theme-toggle" class="icon-btn" title="Cambiar tema" aria-label="Cambiar tema"><i
                                data-lucide="sun-moon"></i></a>
                    </li>
                    <li id="menu-logout" class="hidden"><a href="#" id="logout-link"><i
                                data-lucide="log-out"></i><span>Cerrar
                                sesión</span></a></li>
                </ul>
            </nav>
        </aside>
        <main class="content">
            <div id="content"></div>
        </main>
    </div>

    <div id="app-theme-modal" class="app-theme-modal-overlay hidden" aria-hidden="true">
        <div class="app-theme-modal-card" role="dialog" aria-modal="true" aria-labelledby="app-theme-modal-title">
            <div class="app-theme-modal-header">
                <h2 id="app-theme-modal-title">Opciones</h2>
                <button id="app-theme-modal-close" class="btn-modal-close app-theme-modal-close" type="button"
                    aria-label="Cerrar"><i data-lucide="x"></i></button>
            </div>

            <div class="app-theme-section">
                <h3 class="app-theme-section-label">Tema</h3>
                <div class="app-theme-swatches" id="app-theme-swatches">
                    <button class="app-theme-swatch" data-theme="dark" type="button" title="Dark">
                        <span class="swatch-tones">
                            <span class="swatch-tone" style="background:#242426;"></span>
                            <span class="swatch-tone" style="background:#C62828;"></span>
                            <span class="swatch-tone" style="background:#4A4A4C;"></span>
                        </span>
                        <span class="swatch-name">Dark</span>
                    </button>
                    <button class="app-theme-swatch" data-theme="light" type="button" title="Light">
                        <span class="swatch-tones">
                            <span class="swatch-tone" style="background:#ebe5da;"></span>
                            <span class="swatch-tone" style="background:#7a3b2e;"></span>
                            <span class="swatch-tone" style="background:#b0a090;"></span>
                        </span>
                        <span class="swatch-name">Light</span>
                    </button>
                    <button class="app-theme-swatch" data-theme="camarilla" type="button" title="Camarilla">
                        <span class="swatch-tones">
                            <span class="swatch-tone" style="background:#dce4d8;"></span>
                            <span class="swatch-tone" style="background:#2d6b3f;"></span>
                            <span class="swatch-tone" style="background:#8aaa92;"></span>
                        </span>
                        <span class="swatch-name">Camarilla</span>
                    </button>
                    <button class="app-theme-swatch" data-theme="sabbat" type="button" title="Sabbat">
                        <span class="swatch-tones">
                            <span class="swatch-tone" style="background:#150808;"></span>
                            <span class="swatch-tone" style="background:#8b0000;"></span>
                            <span class="swatch-tone" style="background:#6b4848;"></span>
                        </span>
                        <span class="swatch-name">Sabbat</span>
                    </button>
                    <button class="app-theme-swatch" data-theme="anarquista" type="button" title="Anarquista">
                        <span class="swatch-tones">
                            <span class="swatch-tone" style="background:#1a2128;"></span>
                            <span class="swatch-tone" style="background:#4a7c8e;"></span>
                            <span class="swatch-tone" style="background:#6b7c85;"></span>
                        </span>
                        <span class="swatch-name">Anarquista</span>
                    </button>
                    <button class="app-theme-swatch" data-theme="phantomas" type="button" title="Phantomas">
                        <span class="swatch-tones">
                            <span class="swatch-tone" style="background:#0f0f0f;"></span>
                            <span class="swatch-tone" style="background:#01a329;"></span>
                            <span class="swatch-tone" style="background:#1a5a2a;"></span>
                        </span>
                        <span class="swatch-name">Phantomas</span>
                    </button>
                </div>
            </div>

            <div class="app-theme-section">
                <h3 class="app-theme-section-label">Fuente</h3>
                <div class="app-font-options" id="app-font-options">
                    <button class="app-font-btn" data-font="clasico" type="button">
                        <span class="font-preview" style="font-family:'delavan',serif">Aa</span>
                        <span class="font-label">Clásico</span>
                    </button>
                    <button class="app-font-btn" data-font="noir" type="button">
                        <span class="font-preview" style="font-family:'Courier Prime',monospace">Aa</span>
                        <span class="font-label">Noir</span>
                    </button>
                    <button class="app-font-btn" data-font="terminal" type="button">
                        <span class="font-preview" style="font-family:'Share Tech Mono',monospace">Aa</span>
                        <span class="font-label">Terminal</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Password Reset Modal (shown after clicking email link) -->
    <div id="password-reset-modal" style="display:none; position:fixed; z-index:9999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.7); align-items:center; justify-content:center;">
        <div style="
            background: var(--theme-bg-surface, #242426);
            border: 1px solid var(--theme-border-divider, #2A2A2C);
            border-radius: 16px;
            padding: 32px;
            width: 400px;
            max-width: 90%;
            margin: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        ">
            <h2 style="font-family: var(--app-font-heading, 'Special Elite'); margin: 0; color: var(--theme-text-primary, #F5F5F0); font-size: 22px;">
                Nueva contraseña
            </h2>
            <p style="font-family: var(--app-font-body, 'Special Elite'); font-size: 13px; color: var(--theme-text-secondary, #6E6E70); margin: 0;">
                Debe tener al menos 6 caracteres, incluyendo letras y números.
            </p>
            <input id="pw-reset-input" type="password" placeholder="Nueva contraseña"
                style="
                    width: 100%;
                    height: 44px;
                    padding: 0 14px;
                    background: var(--theme-bg-elevated, #2A2A2C);
                    border: 1px solid var(--theme-text-tertiary, #4A4A4C);
                    border-radius: 10px;
                    font-family: var(--app-font-body, 'Special Elite');
                    font-size: 14px;
                    color: var(--theme-text-primary, #F5F5F0);
                    outline: none;
                    box-sizing: border-box;
                " />
            <input id="pw-reset-confirm" type="password" placeholder="Confirmar contraseña"
                style="
                    width: 100%;
                    height: 44px;
                    padding: 0 14px;
                    background: var(--theme-bg-elevated, #2A2A2C);
                    border: 1px solid var(--theme-text-tertiary, #4A4A4C);
                    border-radius: 10px;
                    font-family: var(--app-font-body, 'Special Elite');
                    font-size: 14px;
                    color: var(--theme-text-primary, #F5F5F0);
                    outline: none;
                    box-sizing: border-box;
                " />
            <p id="pw-reset-msg" style="font-family: var(--app-font-body, 'Special Elite'); font-size: 12px; margin: 0; min-height: 16px; color: var(--theme-accent, #C62828);"></p>
            <div style="display: flex; gap: 10px;">
                <button id="pw-reset-cancel" type="button"
                    style="
                        flex: 1;
                        height: 40px;
                        border-radius: 10px;
                        border: 1px solid var(--theme-text-tertiary, #4A4A4C);
                        background: transparent;
                        color: var(--theme-text-primary, #F5F5F0);
                        font-family: var(--app-font-body, 'Special Elite');
                        font-size: 13px;
                        cursor: pointer;
                    ">Cancelar</button>
                <button id="pw-reset-save" type="button"
                    style="
                        flex: 1;
                        height: 40px;
                        border-radius: 10px;
                        border: none;
                        background: var(--theme-accent, #C62828);
                        color: #fff;
                        font-family: var(--app-font-body, 'Special Elite');
                        font-size: 13px;
                        font-weight: 600;
                        cursor: pointer;
                    ">Guardar</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.255.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
    <script src="js/supabase.js"></script>
    <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
    <script src="js/actions-ui.js"></script>
    <script src="js/detail.zone.js" defer></script>
    <script src="js/game.js" defer></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/features/shared/modal.js"></script>
    <script src="js/features/chronicles/service.js"></script>
    <script src="js/features/chronicles/view.js"></script>
    <script src="js/features/chronicles/controller.js"></script>
    <script src="js/features/chronicles/index.js"></script>
    <script src="js/shared-picker.js"></script>
    <script src="js/template-definitions.js"></script>
    <script src="js/combat-tracker.js"></script>

    <script src="js/router.js"></script>
</body>

</html>
