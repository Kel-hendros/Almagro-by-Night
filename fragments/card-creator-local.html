<link rel="stylesheet" href="css/card-creator.css">
<link rel="stylesheet" href="css/card-creator-custom-border.css">

<div id="cc-root" class="main-container games cc-root">

  <!-- Header -->
  <div class="chronicles-header">
    <div class="chronicles-title-wrap">
      <h1>Creador de Cartas</h1>
      <p class="chronicles-subtitle">Genera cartas de personajes WoD con bordes, iconos y exportación PNG.</p>
    </div>
    <div class="chronicles-actions">
      <button type="button" data-history-back class="btn btn--ghost">← Volver</button>
    </div>
  </div>

  <div class="cc-body">
    <!-- ── Controls panel ── -->
    <div class="cc-controls">

      <!-- Image upload -->
      <div>
        <div class="cc-image-form">
          <label for="cc-file-input" class="cc-file-label">Subir imagen</label>
          <input type="file" id="cc-file-input" accept="image/*" style="display:none">
          <input type="url" id="cc-url-input" class="cc-url-input" placeholder="Pegar URL de imagen">
        </div>
      </div>

      <!-- Creature type -->
      <div>
        <p class="cc-section-title">Tipo de criatura</p>
        <div id="cc-creature-icons" class="cc-creature-icons"></div>
        <div class="cc-position-buttons">
          <button class="cc-pos-btn" data-pos="left">Izquierda</button>
          <button class="cc-pos-btn" data-pos="center">Centro</button>
          <button class="cc-pos-btn" data-pos="right">Derecha</button>
        </div>
      </div>

      <!-- Clan (shown only for cainita) -->
      <div id="cc-clan-form" class="cc-clan-form hidden">
        <p class="cc-section-title">Clan</p>
        <select id="cc-clan-select"></select>
      </div>

      <!-- Border -->
      <div>
        <p class="cc-section-title">Borde</p>
        <div class="cc-border-mode-toggle">
          <button class="cc-mode-btn active" data-mode="gallery">Galería</button>
          <button class="cc-mode-btn" data-mode="custom">Personalizado</button>
        </div>
        <p id="cc-selected-border-row" class="cc-selected-border-row">Borde: <span id="cc-selected-border" class="cc-selected-border">Mármol Verde</span></p>
        <div id="cc-border-options" class="cc-border-options"></div>
        <div id="cc-custom-border-panel" class="hidden"></div>
      </div>

      <!-- Text -->
      <div class="cc-text-controls">
        <p class="cc-section-title">Texto</p>
        <label for="cc-card-name">Nombre</label>
        <input type="text" id="cc-card-name" placeholder="Nombre del personaje">
        <div class="cc-font-size-row">
          <label>Tamaño</label>
          <input type="range" id="cc-title-size" min="0.6" max="2" step="0.05" value="1">
          <span id="cc-title-size-label" class="cc-size-indicator">0</span>
        </div>
        <label for="cc-card-desc">Descripción</label>
        <textarea id="cc-card-desc" rows="3" placeholder="Breve descripción"></textarea>
        <div class="cc-font-size-row">
          <label>Tamaño</label>
          <input type="range" id="cc-desc-size" min="0.6" max="2" step="0.05" value="1">
          <span id="cc-desc-size-label" class="cc-size-indicator">0</span>
        </div>
      </div>

      <!-- Export size -->
      <div>
        <p class="cc-section-title">Tamaño de exportación</p>
        <select id="cc-size-select" class="cc-size-select"></select>
        <div id="cc-custom-size-row" class="cc-custom-size-row hidden">
          <label for="cc-custom-w">Ancho (px)</label>
          <input type="number" id="cc-custom-w" class="cc-custom-w-input" value="663" min="100" max="4000" step="1">
          <span class="cc-size-hint">Alto se calcula automáticamente (ratio 2:3)</span>
        </div>
      </div>

    </div>

    <!-- ── Card preview ── -->
    <div class="cc-preview-pane">
      <!-- Image adjustments box -->
      <div class="cc-adjustments-box">
        <p class="cc-section-title">Ajustes de imagen</p>
        <div class="cc-font-size-row">
          <label>Brillo</label>
          <input type="range" id="cc-brightness" min="0.2" max="2" step="0.05" value="1">
          <span id="cc-brightness-label" class="cc-size-indicator">0</span>
        </div>
        <div class="cc-font-size-row">
          <label>Contraste</label>
          <input type="range" id="cc-contrast" min="0.2" max="2" step="0.05" value="1">
          <span id="cc-contrast-label" class="cc-size-indicator">0</span>
        </div>
        <div class="cc-font-size-row">
          <label>Saturación</label>
          <input type="range" id="cc-saturate" min="0" max="2" step="0.05" value="1">
          <span id="cc-saturate-label" class="cc-size-indicator">0</span>
        </div>
      </div>
      <div id="cc-card-wrapper">
        <div class="cc-card">
          <img class="icon cc-type-icon center hidden" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Tipo">
          <img class="icon cc-clan-icon hidden" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Clan">
          <div class="cc-border-layer"></div>
          <div class="cc-user-image">
            <img src="js/tools/card-creator/assets/imagenes/default/defaultImage.png" alt="Imagen">
          </div>
          <div class="cc-card-text">
            <span class="cc-card-title">Nombre del personaje</span>
            <span class="cc-card-description">Breve descripción del personaje</span>
          </div>
        </div>
      </div>
      <!-- Sliders below card -->
      <div class="cc-preview-sliders">
        <div class="cc-slider-group">
          <label for="cc-range-x">Horizontal</label>
          <input type="range" id="cc-range-x" min="0" max="0" value="0">
        </div>
        <div class="cc-slider-group">
          <label for="cc-range-y">Vertical</label>
          <input type="range" id="cc-range-y" min="0" max="0" value="0">
        </div>
        <div class="cc-slider-group">
          <label for="cc-range-zoom">Zoom</label>
          <input type="range" id="cc-range-zoom" min="-200" max="200" value="0">
        </div>
      </div>
      <button id="cc-export-btn" class="cc-export-btn">Descargar PNG</button>
    </div>

  </div>
</div>

<script src="js/tools/card-creator/custom-border.js"></script>
<script src="js/tools/card-creator/card-creator.js"></script>
<script>if (window.initCardCreatorLocal) window.initCardCreatorLocal();</script>
