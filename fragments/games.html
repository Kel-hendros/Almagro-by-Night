<div class="main-container games">
    <div id="games-breadcrumb" class="chronicle-breadcrumb" style="display: none;"></div>
    <div class="chronicles-header games-header">
        <div class="chronicles-title-wrap">
            <h1>Almagro de Noche</h1>
            <p class="chronicles-subtitle">La Banda de Loquillo y la Cuadrilla de la Forza disputan el control del barrio de Almagro.</p>
        </div>
    </div>

    <div id="single-game-card" class="single-game-card">
        <div id="single-game-skeleton" class="skeleton-group">
            <div class="skeleton skeleton--title"></div>
            <div class="skeleton skeleton--line"></div>
            <div class="skeleton skeleton--line-short"></div>
            <div class="skeleton skeleton--block" style="height:44px; width:180px; margin-top:8px;"></div>
        </div>
        <div id="single-game-content" class="hidden">
            <div class="single-game-header">
                <div>
                    <h2 id="single-game-name"></h2>
                    <p id="single-game-meta" class="single-game-meta"></p>
                </div>
                <div class="single-game-territory">
                    <span>Territorio</span>
                    <strong id="single-game-territory"></strong>
                </div>
            </div>

            <div class="single-game-body">
                <p id="single-game-director"></p>
                <p class="single-game-id">
                    ID: <code id="single-game-id-value"></code>
                </p>
            </div>

            <div class="single-game-actions">
                <button id="enter-game-btn" class="btn btn--primary gameButton primary">Entrar a la partida</button>
                <button id="copy-game-id-btn" class="btn btn--ghost gameButton secondary hidden">Copiar ID</button>
            </div>

            <p id="single-game-status" class="single-game-status muted"></p>
        </div>
    </div>
</div>

<div id="players-management" class="players-management hidden">
    <div class="players-management-header">
        <h2>Jugadores registrados</h2>
        <p class="muted">Gestioná quién participa de la crónica.</p>
    </div>
    <div class="players-columns">
        <section>
            <header>
                <h3>Participantes</h3>
            </header>
            <div id="participants-list" class="players-grid"></div>
        </section>
        <section>
            <header>
                <h3>Registrados pendientes</h3>
            </header>
            <div id="pending-list" class="players-grid"></div>
        </section>
    </div>
</div>
