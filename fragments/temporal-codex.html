<link rel="stylesheet" href="css/temporal-codex.css">

<div class="main-container games temporal-codex-root">

    <!-- Header -->
    <div class="chronicles-header">
        <div class="chronicles-title-wrap">
            <h1>Temporal Codex</h1>
            <p class="chronicles-subtitle">Calculadora de edades para crónicas y líneas temporales.</p>
        </div>
        <div class="chronicles-actions">
            <button type="button" data-history-back class="btn btn--ghost">← Volver</button>
        </div>
    </div>

    <!-- Content -->
    <div class="temporal-codex-content">

        <!-- Error Banner -->
        <div id="codex-error" class="codex-error-banner hidden">
            <i data-lucide="alert-circle" class="icon-danger"></i>
            <p id="codex-error-text">Error message here</p>
        </div>

        <!-- Form -->
        <div class="codex-form">

            <!-- Anchor -->
            <div class="codex-form-group">
                <label class="codex-form-label">
                    <i data-lucide="calendar"></i>
                    Año Actual
                </label>
                <input type="number" id="input-fecha-actual" class="codex-form-input" placeholder="2020">
            </div>

            <!-- Dates -->
            <div class="codex-grid-2">
                <div class="codex-form-group">
                    <label class="codex-form-label">
                        <i data-lucide="baby"></i>
                        Nacimiento
                    </label>
                    <input type="number" id="input-fecha-nacimiento" class="codex-form-input" placeholder="...">
                </div>
                <div class="codex-form-group">
                    <label class="codex-form-label">
                        <i data-lucide="droplet"></i>
                        Abrazo
                    </label>
                    <input type="number" id="input-fecha-abrazo" class="codex-form-input" placeholder="...">
                </div>
            </div>

            <!-- Divider -->
            <div class="codex-divider">
                <div class="codex-divider-line"></div>
                <div class="codex-divider-text">Cómputo de Edad</div>
                <div class="codex-divider-line"></div>
            </div>

            <!-- Ages -->
            <div class="codex-grid-2">
                <div class="codex-form-group">
                    <label class="codex-form-label">
                        <i data-lucide="user"></i>
                        Años como Mortal
                    </label>
                    <input type="number" id="input-edad-humana" class="codex-form-input" placeholder="...">
                </div>
                <div class="codex-form-group">
                    <label class="codex-form-label">
                        <i data-lucide="skull"></i>
                        Años como Vástago
                    </label>
                    <input type="number" id="input-edad-vastago" class="codex-form-input" placeholder="...">
                </div>
            </div>

            <!-- Total -->
            <div class="codex-form-group">
                <label class="codex-form-label codex-label-accent">
                    <i data-lucide="hourglass"></i>
                    Existencia Total
                </label>
                <input type="number" id="input-edad-total" class="codex-form-input codex-input-accent" placeholder="...">
            </div>

            <!-- Reset button -->
            <button id="codex-reset" class="codex-reset-btn">
                <i data-lucide="trash-2"></i>
                Reiniciar
            </button>

        </div>

    </div>
</div>

<script src="js/temporal-codex.js"></script>
<script>
    if (window.lucide) window.lucide.createIcons();
    if (window.initTemporalCodex) window.initTemporalCodex();
</script>
