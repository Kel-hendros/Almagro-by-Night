<style>
    .settings-page {
        padding: 2rem;
    }

    .settings-title {
        margin: 0;
        font-family: var(--app-font-heading);
        font-size: 1.6rem;
        line-height: 1.2;
        color: var(--color-accent);
        font-weight: 700;
    }

    .settings-subtitle {
        margin-top: 0.35rem;
        margin-bottom: 1.5rem;
        color: var(--color-text-muted);
        font-size: 0.88rem;
        letter-spacing: 0.02em;
    }

    .settings-card {
        width: 100%;
        max-width: 560px;
        border: 1px solid var(--color-border-subtle);
        border-radius: 12px;
        background: color-mix(in srgb, var(--color-bg-base) 72%, transparent);
        padding: 1.25rem 1.5rem;
        box-shadow: 0 10px 28px -10px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(4px);
    }

    .settings-row {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-bottom: 1.1rem;
    }

    .settings-row:last-child {
        margin-bottom: 0;
    }

    .settings-label {
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 1.2px;
        text-transform: uppercase;
        color: var(--color-text-secondary);
    }

    .settings-value {
        color: var(--color-text-primary);
        font-size: 0.95rem;
    }

    .settings-name-value {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .settings-edit-inline {
        width: 24px;
        height: 24px;
        border-radius: 6px;
        border: 1px solid var(--color-text-muted);
        background: color-mix(in srgb, var(--color-bg-base) 40%, transparent);
        color: var(--color-text-muted);
        display: inline-flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        padding: 0;
    }

    .settings-edit-inline:hover {
        color: var(--color-accent);
        border-color: var(--color-accent);
    }

    .settings-edit-inline .lucide {
        width: 13px;
        height: 13px;
    }

    .settings-name-editor {
        display: none;
        align-items: center;
        gap: 8px;
    }

    .settings-name-editor.visible {
        display: inline-flex;
    }

    .settings-name-input {
        height: 34px;
        min-width: 240px;
        border-radius: 8px;
        border: 1px solid var(--color-border-subtle);
        background: color-mix(in srgb, var(--color-bg-base) 40%, transparent);
        color: var(--color-text-primary);
        font-family: var(--app-font-body);
        font-size: 0.9rem;
        padding: 0 12px;
        outline: none;
    }

    .settings-name-input:focus {
        border-color: var(--color-accent);
    }

    .settings-inline-btn {
        height: 34px;
        min-width: 72px;
        border-radius: 8px;
        border: 1px solid var(--color-text-muted);
        background: color-mix(in srgb, var(--color-bg-base) 40%, transparent);
        color: var(--color-text-muted);
        font-size: 0.82rem;
        font-family: var(--app-font-body);
        cursor: pointer;
        padding: 0 12px;
    }

    .settings-inline-btn:hover {
        border-color: var(--color-accent);
        color: var(--color-accent);
    }

    .settings-name-msg {
        margin-top: 6px;
        font-size: 0.82rem;
        min-height: 1em;
        color: var(--color-text-muted);
    }

    .settings-name-msg.error {
        color: var(--color-danger);
    }

    .settings-name-msg.success {
        color: var(--theme-success);
    }

    .settings-password-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-top: 8px;
    }

    .settings-reset-btn {
        min-width: 200px;
        height: 34px;
        border-radius: 8px;
        border: 1px solid var(--color-text-muted);
        background: color-mix(in srgb, var(--color-bg-base) 40%, transparent);
        color: var(--color-text-muted);
        font-size: 0.82rem;
        font-family: var(--app-font-body);
        cursor: pointer;
        letter-spacing: 0.02em;
    }

    .settings-reset-btn:hover {
        border-color: var(--color-accent);
        color: var(--color-accent);
    }

    .settings-password-field {
        margin-bottom: 0;
    }

    .settings-storage-info {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 6px;
    }

    .settings-storage-plan {
        font-size: 0.95rem;
        color: var(--color-text-primary);
    }

    .settings-storage-detail {
        font-size: 0.88rem;
        color: var(--color-text-muted);
    }

    .settings-storage-bar {
        width: 100%;
        height: 8px;
        border-radius: 4px;
        background: color-mix(in srgb, var(--color-text-muted) 20%, transparent);
        overflow: hidden;
    }

    .settings-storage-fill {
        height: 100%;
        border-radius: 4px;
        background: var(--theme-info, #5b9bd5);
        transition: width 0.4s ease, background 0.3s ease;
    }

    .settings-storage-fill.is-warning {
        background: var(--theme-warning, #f0a830);
    }

    .settings-storage-fill.is-critical {
        background: var(--color-danger, #e74c3c);
    }

    .settings-storage-warning {
        margin: 8px 0 0;
        font-size: 0.85rem;
        color: var(--theme-warning, #f0a830);
        min-height: 0;
    }

    .settings-storage-warning:empty {
        display: none;
    }

    @media (max-width: 680px) {
        .settings-password-row {
            flex-direction: column;
            align-items: flex-start;
        }

        .settings-reset-btn {
            width: 100%;
            min-width: 0;
        }
    }
</style>

<div class="settings-page">
    <h1 class="settings-title">Mi Cuenta</h1>
    <p class="settings-subtitle">Datos de tu usuario</p>

    <div class="settings-card">
        <div class="settings-row">
            <span class="settings-label">Nombre</span>
            <div class="settings-name-value">
                <span id="settings-user-name" class="settings-value">-</span>
                <button id="settings-edit-name-btn" type="button" class="settings-edit-inline" title="Editar nombre">
                    <i data-lucide="pencil"></i>
                </button>
                <div id="settings-name-editor" class="settings-name-editor">
                    <input id="settings-name-input" class="settings-name-input" type="text" maxlength="80" />
                    <button id="settings-name-save" class="settings-inline-btn" type="button">Guardar</button>
                    <button id="settings-name-cancel" class="settings-inline-btn" type="button">Cancelar</button>
                </div>
            </div>
            <p id="settings-name-msg" class="settings-name-msg"></p>
        </div>

        <div class="settings-row">
            <span class="settings-label">Email</span>
            <span id="settings-user-email" class="settings-value">-</span>
        </div>

        <div class="settings-password-row">
            <div class="settings-row settings-password-field">
                <span class="settings-label">Contraseña</span>
                <span class="settings-value">••••••••••</span>
            </div>
            <button id="settings-reset-password-btn" class="settings-reset-btn" type="button">Resetear contraseña</button>
        </div>
    </div>

    <div class="settings-card" style="margin-top: 1rem;">
        <div class="settings-row" style="margin-bottom: 0;">
            <span class="settings-label">Uso de almacenamiento</span>
            <div class="settings-storage-info">
                <span id="settings-storage-plan" class="settings-storage-plan">Plan gratuito: 20 MB</span>
                <span id="settings-storage-detail" class="settings-storage-detail"></span>
            </div>
            <div class="settings-storage-bar">
                <div id="settings-storage-fill" class="settings-storage-fill" style="width: 0%;"></div>
            </div>
            <p id="settings-storage-warning" class="settings-storage-warning"></p>
        </div>
    </div>
</div>

<script>
    (async function initSettingsView() {
        let currentSession = null;
        let currentDisplayName = "-";

        const nameEl = document.getElementById("settings-user-name");
        const emailEl = document.getElementById("settings-user-email");
        const editBtn = document.getElementById("settings-edit-name-btn");
        const editor = document.getElementById("settings-name-editor");
        const nameInput = document.getElementById("settings-name-input");
        const saveBtn = document.getElementById("settings-name-save");
        const cancelBtn = document.getElementById("settings-name-cancel");
        const nameMsg = document.getElementById("settings-name-msg");

        function setNameMessage(text, type = "") {
            if (!nameMsg) return;
            nameMsg.textContent = text || "";
            nameMsg.className = `settings-name-msg${type ? ` ${type}` : ""}`;
        }

        function toggleNameEdit(editing) {
            if (!editor || !editBtn || !nameEl) return;
            editor.classList.toggle("visible", editing);
            editBtn.classList.toggle("hidden", editing);
            nameEl.classList.toggle("hidden", editing);
            if (editing && nameInput) {
                nameInput.value = currentDisplayName || "";
                nameInput.focus();
                nameInput.select();
            }
        }

        try {
            const { data: { session } } = await supabase.auth.getSession();
            currentSession = session || null;
            const userId = currentSession?.user?.id;
            const userEmail = session?.user?.email || "-";
            if (userId) {
                const { data: playerRow } = await supabase
                    .from("players")
                    .select("name")
                    .eq("user_id", userId)
                    .maybeSingle();
                currentDisplayName = playerRow?.name || session?.user?.user_metadata?.full_name || session?.user?.email || "-";
            } else {
                currentDisplayName = "-";
            }
            if (nameEl) nameEl.textContent = currentDisplayName;
            if (emailEl) emailEl.textContent = userEmail;
        } catch (err) {
            console.error("Settings init error:", err);
            setNameMessage("No se pudieron cargar los datos de cuenta.", "error");
        }

        if (editBtn && saveBtn && cancelBtn && nameInput) {
            editBtn.addEventListener("click", () => {
                setNameMessage("");
                toggleNameEdit(true);
            });

            cancelBtn.addEventListener("click", () => {
                setNameMessage("");
                toggleNameEdit(false);
            });

            nameInput.addEventListener("keydown", (ev) => {
                if (ev.key === "Escape") {
                    ev.preventDefault();
                    setNameMessage("");
                    toggleNameEdit(false);
                }
                if (ev.key === "Enter") {
                    ev.preventDefault();
                    saveBtn.click();
                }
            });

            saveBtn.addEventListener("click", async () => {
                const session = currentSession;
                const userId = session?.user?.id;
                const newName = (nameInput.value || "").trim();

                if (!userId) {
                    setNameMessage("No hay sesión activa.", "error");
                    return;
                }
                if (newName.length < 2) {
                    setNameMessage("El nombre debe tener al menos 2 caracteres.", "error");
                    return;
                }

                saveBtn.disabled = true;
                cancelBtn.disabled = true;
                setNameMessage("Guardando...");

                try {
                    const { error: updateErr } = await supabase
                        .from("players")
                        .update({ name: newName })
                        .eq("user_id", userId);

                    if (updateErr) {
                        throw updateErr;
                    }

                    const { error: metaErr } = await supabase.auth.updateUser({
                        data: { full_name: newName },
                    });
                    if (metaErr) {
                        console.warn("Could not update auth metadata:", metaErr);
                    }

                    currentDisplayName = newName;
                    if (nameEl) nameEl.textContent = currentDisplayName;
                    const sidebarName = document.getElementById("user-name");
                    if (sidebarName) sidebarName.textContent = currentDisplayName;
                    setNameMessage("Nombre actualizado.", "success");
                    toggleNameEdit(false);
                } catch (err) {
                    console.error("Settings name update error:", err);
                    setNameMessage(`No se pudo guardar el nombre: ${err.message || "Error desconocido"}`, "error");
                } finally {
                    saveBtn.disabled = false;
                    cancelBtn.disabled = false;
                }
            });
        }

        const resetBtn = document.getElementById("settings-reset-password-btn");
        if (resetBtn) {
            resetBtn.addEventListener("click", async () => {
                const { data: { session } } = await supabase.auth.getSession();
                const email = session?.user?.email;
                if (!email) {
                    alert("No se pudo determinar el email del usuario.");
                    return;
                }
                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: `${window.location.origin}${window.location.pathname}#welcome`,
                });
                if (error) {
                    alert(`Error al enviar el email de reseteo: ${error.message}`);
                    return;
                }
                alert("Te enviamos un email para resetear la contraseña.");
            });
        }

        // Storage usage
        try {
            const { data: quota } = await supabase.rpc("check_user_storage_quota", { p_incoming_bytes: 0 });
            if (quota) {
                const usageBytes = quota.usage_bytes || 0;
                const limitBytes = quota.limit_bytes;
                const fillEl = document.getElementById("settings-storage-fill");
                const detailEl = document.getElementById("settings-storage-detail");
                const warningEl = document.getElementById("settings-storage-warning");
                const planEl = document.getElementById("settings-storage-plan");

                function formatMB(bytes) {
                    return (bytes / (1024 * 1024)).toFixed(1) + " MB";
                }

                if (limitBytes) {
                    const pct = Math.min(100, (usageBytes / limitBytes) * 100);
                    if (fillEl) {
                        fillEl.style.width = pct.toFixed(1) + "%";
                        fillEl.classList.toggle("is-warning", pct >= 75 && pct < 90);
                        fillEl.classList.toggle("is-critical", pct >= 90);
                    }
                    if (detailEl) detailEl.textContent = formatMB(usageBytes) + " / " + formatMB(limitBytes);
                    if (planEl) planEl.textContent = "Plan gratuito: " + formatMB(limitBytes);
                    if (warningEl && pct >= 90) {
                        warningEl.textContent = "Borra elementos que ya no uses en tus crónicas para liberar espacio.";
                    }
                } else {
                    // Admin / unlimited
                    if (planEl) planEl.textContent = "Sin límite";
                    if (detailEl) detailEl.textContent = formatMB(usageBytes) + " en uso";
                    if (fillEl) fillEl.style.width = "0%";
                }
            }
        } catch (err) {
            console.warn("Could not load storage usage:", err);
        }

        if (window.lucide?.createIcons) {
            lucide.createIcons();
        }
    })();
</script>
