<style>
    .settings-page {
        padding: 24px;
    }

    .settings-title {
        margin: 0;
        font-family: var(--app-font-heading);
        font-size: 2.15rem;
        line-height: 1.1;
        color: var(--sidebar-text-active);
        font-weight: 700;
    }

    .settings-subtitle {
        margin-top: 0.25rem;
        margin-bottom: 1rem;
        color: var(--sidebar-text);
        font-size: 0.75rem;
        letter-spacing: 0.04em;
    }

    .settings-card {
        width: 100%;
        max-width: 860px;
        border: 1px solid var(--sidebar-border);
        border-radius: 12px;
        background: color-mix(in srgb, var(--content-theme-bg) 72%, transparent);
        padding: 14px 16px;
        box-shadow: 0 10px 28px -10px var(--sidebar-shadow-outer);
        backdrop-filter: blur(4px);
    }

    .settings-row {
        display: flex;
        flex-direction: column;
        gap: 2px;
        margin-bottom: 10px;
    }

    .settings-row:last-child {
        margin-bottom: 0;
    }

    .settings-label {
        font-size: 0.62rem;
        font-weight: 600;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--sidebar-text-active);
    }

    .settings-value {
        color: var(--sidebar-text);
        font-size: 0.82rem;
    }

    .settings-name-value {
        display: inline-flex;
        align-items: center;
        gap: 6px;
    }

    .settings-edit-inline {
        width: 20px;
        height: 20px;
        border-radius: 6px;
        border: 1px solid var(--sidebar-text);
        background: var(--sidebar-action-bg);
        color: var(--sidebar-text);
        display: inline-flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        padding: 0;
    }

    .settings-edit-inline:hover {
        color: var(--sidebar-text-active);
        border-color: var(--sidebar-text-active);
    }

    .settings-edit-inline .lucide {
        width: 11px;
        height: 11px;
    }

    .settings-password-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-top: 6px;
    }

    .settings-reset-btn {
        min-width: 190px;
        height: 30px;
        border-radius: 8px;
        border: 1px solid var(--sidebar-text);
        background: var(--sidebar-action-bg);
        color: var(--sidebar-text);
        font-size: 0.68rem;
        font-family: var(--app-font-body);
        cursor: pointer;
        letter-spacing: 0.02em;
    }

    .settings-reset-btn:hover {
        border-color: var(--sidebar-text-active);
        color: var(--sidebar-text-active);
    }

    .settings-password-field {
        margin-bottom: 0;
    }

    @media (max-width: 680px) {
        .settings-password-row {
            flex-direction: column;
            align-items: flex-start;
        }

        .settings-reset-btn {
            width: 100%;
            min-width: 0;
        }
    }
</style>

<div class="settings-page">
    <h1 class="settings-title">Configuración de Cuenta</h1>
    <p class="settings-subtitle">Datos de registro de tu usuario</p>

    <div class="settings-card">
        <div class="settings-row">
            <span class="settings-label">Nombre</span>
            <div class="settings-name-value">
                <span id="settings-user-name" class="settings-value">-</span>
                <button type="button" class="settings-edit-inline" title="Editar nombre">
                    <i data-lucide="pencil"></i>
                </button>
            </div>
        </div>

        <div class="settings-row">
            <span class="settings-label">Email</span>
            <span id="settings-user-email" class="settings-value">-</span>
        </div>

        <div class="settings-password-row">
            <div class="settings-row settings-password-field">
                <span class="settings-label">Contraseña</span>
                <span class="settings-value">••••••••••</span>
            </div>
            <button id="settings-reset-password-btn" class="settings-reset-btn" type="button">Resetear contraseña</button>
        </div>
    </div>
</div>

<script>
    (async function initSettingsView() {
        try {
            const { data: { session } } = await supabase.auth.getSession();
            const userName = session?.user?.user_metadata?.full_name || session?.user?.email || "-";
            const userEmail = session?.user?.email || "-";
            const nameEl = document.getElementById("settings-user-name");
            const emailEl = document.getElementById("settings-user-email");
            if (nameEl) nameEl.textContent = userName;
            if (emailEl) emailEl.textContent = userEmail;
        } catch (err) {
            console.error("Settings init error:", err);
        }

        const resetBtn = document.getElementById("settings-reset-password-btn");
        if (resetBtn) {
            resetBtn.addEventListener("click", async () => {
                const { data: { session } } = await supabase.auth.getSession();
                const email = session?.user?.email;
                if (!email) {
                    alert("No se pudo determinar el email del usuario.");
                    return;
                }
                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: `${window.location.origin}${window.location.pathname}#welcome`,
                });
                if (error) {
                    alert(`Error al enviar el email de reseteo: ${error.message}`);
                    return;
                }
                alert("Te enviamos un email para resetear la contraseña.");
            });
        }

        if (window.lucide?.createIcons) {
            lucide.createIcons();
        }
    })();
</script>
