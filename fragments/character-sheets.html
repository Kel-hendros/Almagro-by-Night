<div class="main-container games cs-page">
    <div class="chronicles-header">
        <div class="chronicles-title-wrap">
            <h1>Personajes</h1>
            <p class="chronicles-subtitle">Gestiona todas tus hojas de personaje en un solo lugar.</p>
        </div>
        <div class="chronicles-actions">
            <button class="btn btn--primary chronicles-action-btn" id="cs-add-btn" data-character-action="create" type="button">+ Nuevo Personaje</button>
        </div>
    </div>

    <div id="sheets-grid" class="cs-grid">
        <article class="cs-card cs-card--skeleton" aria-hidden="true">
            <div class="cs-card-banner">
                <div class="cs-skeleton cs-skeleton--banner"></div>
            </div>
            <div class="cs-card-body">
                <div class="cs-skeleton cs-skeleton--title"></div>
                <div class="cs-skeleton cs-skeleton--line"></div>
                <div class="cs-skeleton cs-skeleton--line cs-skeleton--line-short"></div>
            </div>
        </article>
        <article class="cs-card cs-card--skeleton" aria-hidden="true">
            <div class="cs-card-banner">
                <div class="cs-skeleton cs-skeleton--banner"></div>
            </div>
            <div class="cs-card-body">
                <div class="cs-skeleton cs-skeleton--title"></div>
                <div class="cs-skeleton cs-skeleton--line"></div>
                <div class="cs-skeleton cs-skeleton--line cs-skeleton--line-short"></div>
            </div>
        </article>
        <article class="cs-card cs-card--skeleton" aria-hidden="true">
            <div class="cs-card-banner">
                <div class="cs-skeleton cs-skeleton--banner"></div>
            </div>
            <div class="cs-card-body">
                <div class="cs-skeleton cs-skeleton--title"></div>
                <div class="cs-skeleton cs-skeleton--line"></div>
                <div class="cs-skeleton cs-skeleton--line cs-skeleton--line-short"></div>
            </div>
        </article>
        <article class="cs-card cs-card--skeleton" aria-hidden="true">
            <div class="cs-card-banner">
                <div class="cs-skeleton cs-skeleton--banner"></div>
            </div>
            <div class="cs-card-body">
                <div class="cs-skeleton cs-skeleton--title"></div>
                <div class="cs-skeleton cs-skeleton--line"></div>
                <div class="cs-skeleton cs-skeleton--line cs-skeleton--line-short"></div>
            </div>
        </article>
    </div>
</div>

<input type="file" id="avatar-input" accept="image/*" class="hidden">

<div id="avatar-modal" class="cs-modal-overlay">
    <div class="cs-modal" role="dialog" aria-modal="true" aria-labelledby="cs-avatar-modal-title">
        <h3 id="cs-avatar-modal-title" class="cs-modal-title">Ajustar Posición</h3>
        <p class="cs-modal-hint">Arrastra para mover. Usa el slider para zoom.</p>

        <div class="cs-modal-canvas-wrap">
            <canvas id="repos-canvas" width="300" height="300"></canvas>
        </div>

        <input type="range" id="zoom-slider" min="1" max="3" step="0.05" value="1" class="cs-modal-slider">

        <div class="cs-modal-actions">
            <button id="cs-avatar-cancel" class="btn btn--ghost cs-modal-btn" type="button">Cancelar</button>
            <button id="cs-avatar-save" class="btn btn--primary cs-modal-btn" type="button">Guardar</button>
        </div>
    </div>
</div>

<script src="features/characters/service.js"></script>
<script src="features/characters/view.js"></script>
<script src="features/characters/avatar.js"></script>
<script src="features/characters/controller.js"></script>
<script src="features/characters/index.js"></script>
