<div class="active-session-container">
    <link rel="stylesheet" href="css/active-session.css">

    <header class="as-header">
        <div>
            <h1 id="as-title">Sesion Activa</h1>
            <p id="as-subtitle" class="as-subtitle">Hub operativo del narrador</p>
        </div>
        <div class="as-actions">
            <button id="as-open-revelations" class="btn btn--secondary" type="button">Archivo de Revelaciones</button>
            <button id="as-back-chronicle" class="btn btn--ghost" type="button">Volver a Crónica</button>
        </div>
    </header>

    <section class="as-content">
        <aside class="as-roster">
            <div class="as-panel-head">
                <h2>Personajes</h2>
                <span id="as-roster-count" class="as-counter">0</span>
            </div>
            <div id="as-roster-list" class="as-roster-list">
                <p class="muted">Cargando personajes...</p>
            </div>
        </aside>
    </section>
</div>

<script src="features/active-session/service.js"></script>
<script src="features/active-session/view.js"></script>
<script src="features/active-session/controller.js"></script>
<script src="features/active-session/index.js"></script>
