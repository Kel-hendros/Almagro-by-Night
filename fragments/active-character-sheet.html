<div class="active-character-sheet-container">
    <link rel="stylesheet" href="css/active-character-sheet.css">

    <div id="acs-encounter-embed" class="acs-encounter-embed">
        <iframe id="acs-encounter-frame" class="acs-encounter-frame" title="Encuentro"></iframe>
    </div>

    <button id="acs-handouts-btn" class="acs-handouts-btn hidden" type="button">
        Revelaciones
        <span id="acs-handouts-badge" class="acs-handouts-badge hidden">0</span>
    </button>

    <div id="acs-handouts-modal" class="app-modal-overlay">
        <div class="app-modal acs-handouts-modal">
            <div class="app-modal-header">
                <h2 class="app-modal-title">Archivo de Revelaciones</h2>
                <button id="acs-handouts-close" class="btn-modal-close" type="button" aria-label="Cerrar">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div id="acs-handouts-list" class="acs-handouts-list">
                <p class="muted">Sin revelaciones asociadas.</p>
            </div>
        </div>
    </div>

    <div class="acs-frame-wrap">
        <iframe id="acs-frame" class="acs-frame" title="Hoja de Personaje"></iframe>
    </div>
</div>

<script src="features/characters/sheet-host.js"></script>
<script src="features/active-character-sheet/service.js"></script>
<script src="features/active-character-sheet/view.js"></script>
<script src="features/active-character-sheet/encounter-bridge.js"></script>
<script src="features/active-character-sheet/encounter-bar.js"></script>
<script src="features/active-character-sheet/encounter-persiana.js"></script>
<script src="features/active-character-sheet/handouts-inbox.js"></script>
<script src="features/active-character-sheet/controller.js"></script>
<script src="features/active-character-sheet/index.js"></script>
