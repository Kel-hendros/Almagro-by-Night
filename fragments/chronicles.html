<div class="main-container games">
    <div class="chronicles-header">
        <div class="chronicles-title-wrap">
            <h1>Crónicas</h1>
            <p class="chronicles-subtitle">Selecciona una crónica para continuar la noche.</p>
        </div>
        <div class="chronicles-actions btn-row">
            <button class="btn btn--primary" type="button"
                data-chronicles-action="open-create">+ Nueva Crónica</button>
            <button class="btn btn--secondary" type="button"
                data-chronicles-action="open-join">Unirse con Código</button>
        </div>
    </div>

    <div id="chronicles-grid" class="chronicles-grid">
        <p class="muted">Cargando crónicas...</p>
    </div>
</div>

<!-- Modal: Create Chronicle -->
<div id="modal-create-chronicle" class="app-modal-overlay">
    <div class="app-modal">
        <div class="app-modal-header">
            <h2 class="app-modal-title">Nueva Crónica</h2>
        </div>
        <p id="create-chronicle-msg" class="app-msg"></p>
        <label for="create-chronicle-name" class="app-label">Nombre</label>
        <input type="text" id="create-chronicle-name" class="app-input" placeholder="Ej: Buenos Aires de Noche" maxlength="100">
        <div class="chronicle-modal-actions app-modal-actions btn-row">
            <button class="btn btn--ghost" type="button" data-chronicles-action="close-create">Cancelar</button>
            <button class="btn btn--primary" type="button" data-chronicles-action="submit-create">Crear</button>
        </div>
    </div>
</div>

<!-- Modal: Join Chronicle -->
<div id="modal-join-chronicle" class="app-modal-overlay">
    <div class="app-modal">
        <div class="app-modal-header">
            <h2 class="app-modal-title">Unirse a una Crónica</h2>
        </div>
        <p id="join-chronicle-msg" class="app-msg"></p>
        <label for="join-chronicle-code" class="app-label">Código de invitación</label>
        <input type="text" id="join-chronicle-code" class="app-input app-input--code" placeholder="Ej: ABN7K3XP">
        <div class="chronicle-modal-actions app-modal-actions btn-row">
            <button class="btn btn--ghost" type="button" data-chronicles-action="close-join">Cancelar</button>
            <button class="btn btn--primary" type="button" data-chronicles-action="submit-join">Unirse</button>
        </div>
    </div>
</div>
