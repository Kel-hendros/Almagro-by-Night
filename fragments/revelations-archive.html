<div class="revelations-archive-container">
    <link rel="stylesheet" href="css/revelations-archive.css">

    <header class="ra-header">
        <div>
            <h1 id="ra-title">Archivo de Revelaciones</h1>
            <p id="ra-subtitle" class="ra-subtitle">Crónica</p>
        </div>
        <div class="ra-actions">
            <button id="ra-back-active-session" class="btn btn--secondary hidden" type="button">Volver a Sesión Activa</button>
            <button id="ra-back-chronicle" class="btn btn--ghost" type="button">Volver a Crónica</button>
        </div>
    </header>

    <section id="ra-narrator-panel" class="ra-panel hidden">
        <div class="ra-panel-head">
            <h2>Gestionar revelaciones</h2>
            <span class="ra-counter">Narrador</span>
        </div>

        <form id="ra-form" class="ra-form">
            <div class="ra-grid">
                <label class="ra-field">
                    <span>Titulo</span>
                    <input id="ra-title-input" class="app-input" type="text" maxlength="120" placeholder="Ej: Carta encontrada en el Elysium">
                </label>
                <label class="ra-field">
                    <span>Imagen (URL opcional)</span>
                    <input id="ra-image-input" class="app-input" type="url" placeholder="https://...">
                </label>
            </div>
            <label class="ra-field">
                <span>Descripción (Markdown)</span>
                <textarea id="ra-body-input" class="app-input" rows="4" placeholder="Describe la revelación..."></textarea>
            </label>
            <div class="ra-field">
                <span>Destinatarios</span>
                <div id="ra-recipients" class="ra-recipients">
                    <p class="muted">Cargando jugadores...</p>
                </div>
            </div>
            <div class="ra-form-actions">
                <button type="submit" class="btn btn--primary">Guardar Revelación</button>
                <button id="ra-clear" type="button" class="btn btn--ghost">Limpiar</button>
                <span id="ra-msg" class="ra-msg"></span>
            </div>
        </form>

        <div id="ra-narrator-list" class="ra-list">
            <p class="muted">Cargando revelaciones...</p>
        </div>
    </section>

    <section id="ra-player-panel" class="ra-panel hidden">
        <div class="ra-panel-head">
            <h2>Tus revelaciones</h2>
            <span id="ra-player-count" class="ra-counter">0</span>
        </div>
        <div id="ra-player-list" class="ra-list">
            <p class="muted">Cargando revelaciones...</p>
        </div>
    </section>

    <div id="ra-reader-modal" class="app-modal-overlay">
        <div class="app-modal ra-reader-modal">
            <div class="app-modal-header">
                <h2 id="ra-reader-title" class="app-modal-title">Revelación</h2>
                <button id="ra-reader-close" class="btn-modal-close" type="button" aria-label="Cerrar">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="ra-reader-body">
                <img id="ra-reader-image" class="ra-reader-image hidden" alt="">
                <div id="ra-reader-content" class="ra-reader-content"></div>
            </div>
        </div>
    </div>
</div>

<script src="features/revelations-archive/service.js"></script>
<script src="features/revelations-archive/view.js"></script>
<script src="features/revelations-archive/controller.js"></script>
<script src="features/revelations-archive/index.js"></script>
